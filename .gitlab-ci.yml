stages:
- prepare
- build
- test
- deploy
variables:
  SHA_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:1"
  SHA_MANYLINUX2014_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:manylinux2014-1"
  SHA_MANYLINUX2_24_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:manylinux2_24-1"
devel-container-gitlab:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - master
devel-container-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2014-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_MANYLINUX2014_IMAGE_TAG -f docker/manylinux-2014.Dockerfile .
  - docker push $SHA_MANYLINUX2014_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2-24-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_MANYLINUX2_24_IMAGE_TAG -f docker/manylinux-2_24.Dockerfile .
  - docker push $SHA_MANYLINUX2_24_IMAGE_TAG
  only:
  - merge_requests
compile:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_master
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/GitLabAlpineMasterBranch
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_master"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - cmake --preset GitLabAlpineMasterBranch
  - cd out/build/GitLabAlpineMasterBranch
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - ccache --show-stats
  only:
  - master
compile-merge-request:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_alpine
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestAlpine
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - cmake --preset MergeRequestAlpine
  - cd out/build/MergeRequestAlpine
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - ccache --show-stats
  only:
  - merge_requests
compile-merge-request-manylinux2014:
  stage: build
  image: "$SHA_MANYLINUX2014_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_manylinux2014
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestManyLinux2014
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_manylinux2014"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_manylinux2014"
  - cmake --preset MergeRequestManyLinux2014
  - cd out/build/MergeRequestManyLinux2014
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_manylinux2014"
  - ccache --show-stats
  only:
  - merge_requests
compile-merge-request-manylinux2_24:
  stage: build
  image: "$SHA_MANYLINUX2_24_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_manylinux2_24
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestManyLinux2_24
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_manylinux2_24"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_manylinux2_24"
  - cmake --preset MergeRequestManyLinux2_24
  - cd out/build/MergeRequestManyLinux2_24
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_manylinux2_24"
  - ccache --show-stats
  only:
  - merge_requests
unit-tests:
  stage: test
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestAlpine
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request
  artifacts:
    when: always
    reports:
      junit:
        - build/test_results/*.xml
        - build/test_results_java/junitreports/*.xml
unit-tests-manylinux2014:
  stage: test
  image: "$SHA_MANYLINUX2014_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestManyLinux2014
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-manylinux2014
  artifacts:
    when: always
    reports:
      junit:
        - out/build/MergeRequestManyLinux2014/test_results/*.xml
        - out/build/MergeRequestManyLinux2014/test_results_java/junitreports/*.xml
unit-tests-manylinux2_24:
  stage: test
  image: "$SHA_MANYLINUX2_24_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestManyLinux2_24
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-manylinux2_24
  artifacts:
    when: always
    reports:
      junit:
        - out/build/MergeRequestManyLinux2_24/test_results/*.xml
        - out/build/MergeRequestManyLinux2_24/test_results_java/junitreports/*.xml
pages:
  stage: deploy
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  dependencies:
  - compile
  script:
  - mv out/build/GitLabAlpineMasterBranch/docs/html public
  artifacts:
    paths:
    - public
  only:
  - master
include:
- template: Security/SAST.gitlab-ci.yml
sast:
  variables:
    SAST_EXCLUDED_PATHS: _skbuild, 3rdparty, binpackage, CMake, common, docker, docs,
      examples, java, out, python, tests
    SAST_EXCLUDED_ANALYZERS: bandit, brakeman, eslint, gosec, kubesec, nodejs-scan,
      phpcs-security-audit, pmd-apex, security-code-scan, semgrep, sobelow, spotbugs
    SAST_FLAWFINDER_LEVEL: '4'
  stage: test
