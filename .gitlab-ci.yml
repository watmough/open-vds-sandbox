unit-tests:
  stage: test
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestAlpine
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request
  artifacts:
    when: always
    reports:
      junit:
        - build/test_results/*.xml
        - build/test_results_java/junitreports/*.xml
unit-tests-manylinux2014:
  stage: test
  image: "$SHA_MANYLINUX2014_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestManyLinux2014
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-manylinux2014
  artifacts:
    when: always
    reports:
      junit:
        - out/build/MergeRequestManyLinux2014/test_results/*.xml
        - out/build/MergeRequestManyLinux2014/test_results_java/junitreports/*.xml
