stages:
- prepare
- build
- test
- deploy
variables:
  SHA_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:1"
  SHA_MANYLINUX2014_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:manylinux2014-1"
  SHA_MANYLINUX2_24_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:manylinux2_24-1"
devel-container-gitlab:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - master
gcp-containerize-gitlab:
  stage: prepare
  image: docker:19.03
  tags: ["osdu-small"]
  variables:
    BUILD_PATH: "docker/alpine-gitlab-ci.Dockerfile"
    IMAGE_NAME: "openvds-ingestion"
  script:
    - export EXTRA_DOCKER_TAG=""
    - >
      if [[ "$CI_COMMIT_TAG" != "" ]];
      then EXTRA_DOCKER_TAG="-t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_TAG";
      elif [[ "$CI_COMMIT_REF_NAME" = "master" ]];
      then EXTRA_DOCKER_TAG="-t $CI_REGISTRY_IMAGE/$IMAGE_NAME:latest"; fi
    - docker build -t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA $EXTRA_DOCKER_TAG -f $BUILD_PATH .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/$IMAGE_NAME
  rules:
    - if: "$OSDU_GCP == 'true'"
      when: on_success
devel-container-gcr:
  stage: prepare
  image: docker:19.03
  tags: ["osdu-small"]
  variables:
    OSDU_GCP_IMAGE_PATH: "seismic/open-vds/openvds-ingestion"
    OSDU_GCP_GCR_REGISTRY: "gcr.io/osdu-anthos"
  before_script:
  - cat $OSDU_GCP_DEPLOY_FILE | docker login -u _json_key --password-stdin https://gcr.io
  script:
  - docker build --tag $OSDU_GCP_GCR_REGISTRY/$OSDU_GCP_IMAGE_PATH:$CI_COMMIT_TAG --file docker/alpine-gitlab-ci.Dockerfile .
  - docker push $OSDU_GCP_GCR_REGISTRY/$OSDU_GCP_IMAGE_PATH:$CI_COMMIT_TAG
  rules:
  - if: "$OSDU_GCP == 'true' && $CI_COMMIT_TAG"
    when: on_success
devel-container-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2014-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_MANYLINUX2014_IMAGE_TAG -f docker/manylinux-2014.Dockerfile .
  - docker push $SHA_MANYLINUX2014_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2-24-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_MANYLINUX2_24_IMAGE_TAG -f docker/manylinux-2_24.Dockerfile .
  - docker push $SHA_MANYLINUX2_24_IMAGE_TAG
  only:
  - merge_requests
compile:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_master
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - build
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_master"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - cmake --preset GitLabAlpineMasterBranch
  - cd out/build/GitLabAlpineMasterBranch
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - ccache --show-stats
  only:
  - master
compile-merge-request:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_alpine
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestAlpine
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
