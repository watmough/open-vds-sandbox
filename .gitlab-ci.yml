stages:
- prepare
- build
- test
- deploy
variables:
  MASTER_ALPINE_IMAGE_TAG: "$CI_REGISTRY_IMAGE/master:alpine-1"
  MERGE_REQUEST_BRANCH_ALPINE_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:alpine-1"
  MERGE_REQUEST_BRANCH_MANYLINUX2014_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:manylinux2014-1"
  MERGE_REQUEST_BRANCH_MANYLINUX2_24_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:manylinux2_24-1"
devel-container-alpine-gitlab:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $MASTER_ALPINE_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $MASTER_ALPINE_IMAGE_TAG
  only:
  - master
devel-container-alpine-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $MERGE_REQUEST_BRANCH_ALPINE_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $MERGE_REQUEST_BRANCH_ALPINE_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2014-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $MERGE_REQUEST_BRANCH_MANYLINUX2014_IMAGE_TAG -f docker/manylinux-2014.Dockerfile .
  - docker push $MERGE_REQUEST_BRANCH_MANYLINUX2014_IMAGE_TAG
  only:
  - merge_requests
devel-container-manylinux-2-24-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $MERGE_REQUEST_BRANCH_MANYLINUX2_24_IMAGE_TAG -f docker/manylinux-2_24.Dockerfile .
  - docker push $MERGE_REQUEST_BRANCH_MANYLINUX2_24_IMAGE_TAG
  only:
  - merge_requests
compile-alpine-master:
  stage: build
  image: $MASTER_ALPINE_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_master
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/GitLabAlpineMasterBranch
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_master"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - cmake --preset GitLabAlpineMasterBranch
  - cd out/build/GitLabAlpineMasterBranch
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_master"
  - ccache --show-stats
  only:
  - master
compile-merge-request-alpine:
  stage: build
  image: $MERGE_REQUEST_BRANCH_ALPINE_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_alpine
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestAlpine
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - cmake --preset MergeRequestAlpine
  - cd out/build/MergeRequestAlpine
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache_alpine"
  - ccache --show-stats
  only:
  - merge_requests
