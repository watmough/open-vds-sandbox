stages:
- prepare
- build
- test
- deploy
variables:
  SHA_IMAGE_TAG: "$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG:$CI_COMMIT_SHA"
  CMAKE_OPTIONS: "-GNinja"
cache:
  paths:
  - ccache
  - 3rdparty
devel-container:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - master
devel-container-merge-request:
  stage: prepare
  image: docker:19.03
  tags:
  - docker-runner
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $SHA_IMAGE_TAG -f docker/alpine-gitlab-ci.Dockerfile .
  - docker push $SHA_IMAGE_TAG
  only:
  - merge_requests
compile:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  artifacts:
    expire_in: 1 hr
    paths:
    - build
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - mkdir -p build
  - cd build
  - cmake -DBUILD_DOCS=ON $CMAKE_OPTIONS ..
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache"
  - ccache --show-stats
  only:
  - master
compile-merge-request:
  stage: build
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  artifacts:
    expire_in: 1 hr
    paths:
    - build
  before_script:
  - export CCACHE_BASEDIR="$PWD"
  - export CCACHE_DIR="$PWD/ccache"
  - export CCACHE_COMPILERCHECK=content
  - ccache --zero-stats || true
  - ccache --show-stats || true
  script:
  - mkdir -p build
  - cd build
  - cmake $CMAKE_OPTIONS ..
  - ninja
  after_script:
  - export CCACHE_DIR="$PWD/ccache"
  - ccache --show-stats
  only:
  - merge_requests
unit-tests:
  stage: test
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  script:
  - cd build
  - ctest -V
  only:
  - merge_requests
pages:
  stage: deploy
  image: "$SHA_IMAGE_TAG"
  tags:
  - docker-runner
  script:
  - mv build/docs/html public
  artifacts:
    paths:
    - public
  only:
  - master
include:
- template: Security/SAST.gitlab-ci.yml
sast:
  variables:
    SAST_EXCLUDED_PATHS: _skbuild, 3rdparty, binpackage, CMake, common, docker, docs,
      examples, java, out, python, tests
    SAST_EXCLUDED_ANALYZERS: bandit, brakeman, eslint, gosec, kubesec, nodejs-scan,
      phpcs-security-audit, pmd-apex, security-code-scan, semgrep, sobelow, spotbugs
    SAST_FLAWFINDER_LEVEL: '4'
  stage: test
