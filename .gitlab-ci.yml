compile-merge-request-manylinux2_24:
  stage: build
  image: $MERGE_REQUEST_BRANCH_MANYLINUX2_24_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - ccache_manylinux2_24
    - 3rdparty
  artifacts:
    expire_in: 1 hr
    paths:
    - out/build/MergeRequestManyLinux2_24
