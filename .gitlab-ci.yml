  - merge_requests
unit-tests-alpine:
  stage: test
  image: $MERGE_REQUEST_BRANCH_ALPINE_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestAlpine
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-alpine
  artifacts:
    when: always
    reports:
      junit:
        - build/test_results/*.xml
        - build/test_results_java/junitreports/*.xml
unit-tests-manylinux2014:
  stage: test
  image: $MERGE_REQUEST_BRANCH_MANYLINUX2014_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestManyLinux2014
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-manylinux2014
  artifacts:
    when: always
    reports:
      junit:
        - out/build/MergeRequestManyLinux2014/test_results/*.xml
        - out/build/MergeRequestManyLinux2014/test_results_java/junitreports/*.xml
unit-tests-manylinux2_24:
  stage: test
  image: $MERGE_REQUEST_BRANCH_MANYLINUX2_24_IMAGE_TAG
  tags:
  - docker-runner
  cache:
    paths:
    - 3rdparty
  script:
  - cd out/build/MergeRequestManyLinux2_24
  - ctest -V
  only:
  - merge_requests
  dependencies:
  - compile-merge-request-manylinux2_24
  artifacts:
    when: always
    reports:
      junit:
        - out/build/MergeRequestManyLinux2_24/test_results/*.xml
        - out/build/MergeRequestManyLinux2_24/test_results_java/junitreports/*.xml
pages:
  stage: deploy
  image: $MASTER_ALPINE_IMAGE_TAG
  tags:
  - docker-runner
  dependencies:
  - compile-alpine-master
  script:
  - mv out/build/GitLabAlpineMasterBranch/docs/html public
  artifacts:
    paths:
    - public
  only:
  - master
include:
- template: Security/SAST.gitlab-ci.yml
sast:
  variables:
    SAST_EXCLUDED_PATHS: _skbuild, 3rdparty, binpackage, CMake, common, docker, docs,
      examples, java, out, python, tests
    SAST_EXCLUDED_ANALYZERS: bandit, brakeman, eslint, gosec, kubesec, nodejs-scan,
      phpcs-security-audit, pmd-apex, security-code-scan, semgrep, sobelow, spotbugs
    SAST_FLAWFINDER_LEVEL: '4'
  stage: test
